Name: walletapi
Log:
  Stat: false
Host: 0.0.0.0
Port: 9005
Telemetry:
  Name: walletapi           # 在追踪 UI 中显示的服务名称
  Endpoint: localhost:4318  # 发送 trace 到你现有的 OTLP HTTP Collector（本地部署时 4318 已映射到宿主机）
  Batcher: otlphttp         # HTTP 批处理器
  Sampler: 1.0              # 1.0 = 100% 采样；高流量生产环境建议 0.1
Prometheus:
  Host: 0.0.0.0
  Port: 9107
  Path: /metrics
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: walletapi-api
Rpc:
  Name: walletapi.rpc
  ListenOn: 0.0.0.0:9101
  # walletapi 与 rest 同进程启动时，Telemetry/Prometheus 至少需要有一处生效；
  # 这里放到 Rpc 下也做兜底，确保 zrpc 启动顺序不影响 trace/metrics。
  Telemetry:
    Name: walletapi.rpc         # 在追踪 UI 中显示的服务名称
    Endpoint: localhost:4317    # 发送 trace 到你现有的 OTLP RPC Collector（本地部署时 4317 已映射到宿主机）
    Batcher: otlpgrpc           # RPC 批处理器
    Sampler: 1.0                # 1.0 = 100% 采样；高流量生产环境建议 0.1
  Prometheus:
    Host: 0.0.0.0
    Port: 9107
    Path: /metrics
  # 与 REST 同进程时 zrpc 先执行 logx.SetUp，须在此关闭 Stat，否则会吃掉 RestConf 的 Log.Stat
  Log:
    Stat: false
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: walletapi.rpc
Mysql:
  DataSource: root:123456@tcp(127.0.0.1:33060)/bld-dex?charset=utf8mb4&parseTime=true&loc=Local

# 私钥加密密钥
CustodyMasterKey: "UJ4TxbINUy6Pgi57xiwYJgPgV902/3uC7Wr385Lr6zE="

