Name: ordersapi-api
Log:
  Stat: false
Host: 0.0.0.0
Port: 9006
Telemetry:
  Name: ordersapi           # 在追踪 UI 中显示的服务名称
  Endpoint: localhost:4318  # 发送 trace 到你现有的 OTLP HTTP Collector（本地部署时 4318 已映射到宿主机）
  Batcher: otlphttp         # HTTP 批处理器
  Sampler: 1.0              # 1.0 = 100% 采样；高流量生产环境建议 0.1
Prometheus:
  Host: 0.0.0.0 # 主机地址
  Port: 9106 # 端口
  Path: /metrics # 路径
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: ordersapi-api
WalletRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: walletapi.rpc
  NonBlock: true
Mysql:
  DataSource: root:123456@tcp(127.0.0.1:33060)/bld-dex?charset=utf8mb4&parseTime=true&loc=Local
Kafka:
  Brokers:
    - localhost:9092
  Topic: trade.order.create
  Partitions: 8
SnowflakeNode: 1
Redis:
  Addr: 127.0.0.1:6379
  Password: ""
  DB: 10
Bloom:
  OrdersKey: bloom:orders
  ExpectedInsertions: 10000000
  FalsePositiveRate: 0.01