# OpenTelemetry Collector 本地最小配置
# 作用：接收应用 OTLP traces -> 批处理 -> 输出到 debug 日志

receivers:
  # 接收器：接收应用上报的 OTLP（gRPC/HTTP）
  otlp:
    protocols:
      # OTLP gRPC，通常 4317
      grpc:
        endpoint: 0.0.0.0:${OTLP_GRPC_PORT}
      # OTLP HTTP，通常 4318
      http:
        endpoint: 0.0.0.0:${OTLP_HTTP_PORT}

processors:
  # 处理器：批量聚合后再导出，降低导出开销
  batch:
    # 最长等待时间，超时即发送
    timeout: 1s
    # 单批次最大发送条数
    send_batch_size: 1024

exporters:
  # 导出器：本地调试用（打印到 collector 日志）
  # 后续可替换为 otlp/jaeger/tempo 等后端
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      # 供 Prometheus 在 Docker 网络内抓取
      address: 0.0.0.0:8888
  # traces 流水线：接收 -> 处理 -> 导出
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
